apiVersion: apps/v1
kind: Deployment
metadata:
  name: yata-flight
  namespace: spinkube
  labels:
    app.kubernetes.io/name: yata-flight
    app.kubernetes.io/component: data-flight
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: yata-flight
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yata-flight
        app.kubernetes.io/component: data-flight
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: flight
          image: ghcr.io/gftdcojp/yata-flight:20260315-6bd85c45a8-amd64
          ports:
            - name: grpc
              containerPort: 32010
              protocol: TCP
          env:
            - name: YATA_FLIGHT_ADDR
              value: "0.0.0.0:32010"
            - name: YATA_LANCE_URI
              value: "s3://ai-gftd-lancedb/yata-lancedb"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: nata-s3-credentials
                  key: NATA_S3_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nata-s3-credentials
                  key: NATA_S3_SECRET_KEY
            - name: AWS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: nata-s3-credentials
                  key: NATA_S3_ENDPOINT
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: nata-s3-credentials
                  key: NATA_S3_REGION
            - name: AWS_VIRTUAL_HOSTED_STYLE_REQUEST
              value: "false"
            - name: RUST_LOG
              value: "yata_flight=info"
          readinessProbe:
            tcpSocket:
              port: 32010
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 32010
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: yata-flight
  namespace: spinkube
  labels:
    app.kubernetes.io/name: yata-flight
spec:
  selector:
    app.kubernetes.io/name: yata-flight
  ports:
    - name: grpc
      port: 32010
      targetPort: 32010
      protocol: TCP
  type: ClusterIP
