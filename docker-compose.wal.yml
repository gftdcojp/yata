# WAL Projection local test: Write Container + Read Replicas + MinIO
#
# Architecture:
#   yata-write:  WAL append + CSR merge (port 8083)
#   yata-read-0: WAL consumer + CSR query (port 8090)
#   yata-read-1: WAL consumer + CSR query (port 8091)
#   minio:       S3-compatible (WAL segments + checkpoints)
#
# Usage:
#   docker compose -f docker-compose.wal.yml up -d --build
#   cargo test -p yata-server --test e2e_wal_projection -- --nocapture
#
# Manual test:
#   # Write
#   curl -X POST http://localhost:8083/xrpc/ai.gftd.yata.mergeRecordWal \
#     -H 'Content-Type: application/json' -H 'X-Magatama-Verified: true' \
#     -d '{"label":"Post","pk_key":"rkey","pk_value":"pk1","props":{"text":"hello"}}'
#
#   # WAL tail (from write container)
#   curl -X POST http://localhost:8083/xrpc/ai.gftd.yata.walTail \
#     -H 'Content-Type: application/json' -d '{"after_seq":0,"limit":100}'
#
#   # WAL apply (push to read replica)
#   curl -X POST http://localhost:8090/xrpc/ai.gftd.yata.walApply \
#     -H 'Content-Type: application/json' \
#     -d '{"entries":[<paste entries from walTail>]}'
#
#   # Read from replica
#   curl -X POST http://localhost:8090/xrpc/ai.gftd.yata.cypher \
#     -H 'Content-Type: application/json' -H 'X-Magatama-Verified: true' \
#     -d '{"statement":"MATCH (p:Post) RETURN p.text AS text LIMIT 10"}'
#
#   # Flush WAL to R2
#   curl -X POST http://localhost:8083/xrpc/ai.gftd.yata.walFlushSegment
#
#   # Checkpoint
#   curl -X POST http://localhost:8083/xrpc/ai.gftd.yata.walCheckpoint
#
#   # Cold start read replica from checkpoint + WAL
#   curl -X POST http://localhost:8090/xrpc/ai.gftd.yata.walColdStart

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/yata --ignore-existing &&
        echo 'Bucket yata created'
      "

  # ── Write Container ──
  yata-write:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8083:8081"
      - "9090:9090"
    environment:
      RUST_LOG: info,yata_engine=debug,yata_s3=debug
      YATA_S3_ENDPOINT: http://minio:9000
      YATA_S3_BUCKET: yata
      YATA_S3_ACCESS_KEY_ID: minioadmin
      YATA_S3_SECRET_ACCESS_KEY: minioadmin
      YATA_S3_REGION: us-east-1
      YATA_S3_PREFIX: "yata/"
      YATA_DATA_DIR: /data/yata
      YATA_REST_PORT: "8081"
      YATA_API_SECRET: test-token
      YATA_VINEYARD_BUDGET_MB: "256"
      YATA_MMAP_VINEYARD: "false"
      YATA_PARTITION_COUNT: "1"
      YATA_HOT_PARTITION_ID: "0"
      YATA_PERSISTENCE_MODE: wal_projection
      YATA_WAL_RING_CAPACITY: "10000"
      YATA_WAL_SEGMENT_MAX_BYTES: "1048576"
      YATA_WAL_SEGMENT_MAX_AGE_SECS: "10"
      YATA_WAL_CHECKPOINT_INTERVAL_SECS: "60"
      PERFORMER_ID: yata-write
      YATA_ORG_ID: test-org
    volumes:
      - yata-write-data:/data/yata
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Read Replica 0 ──
  yata-read-0:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8090:8081"
    environment:
      RUST_LOG: info,yata_engine=debug
      YATA_S3_ENDPOINT: http://minio:9000
      YATA_S3_BUCKET: yata
      YATA_S3_ACCESS_KEY_ID: minioadmin
      YATA_S3_SECRET_ACCESS_KEY: minioadmin
      YATA_S3_REGION: us-east-1
      YATA_S3_PREFIX: "yata/"
      YATA_DATA_DIR: /data/yata
      YATA_REST_PORT: "8081"
      YATA_API_SECRET: test-token
      YATA_VINEYARD_BUDGET_MB: "256"
      YATA_HOT_PARTITION_ID: "0"
      YATA_PERSISTENCE_MODE: wal_projection
      YATA_READONLY: "true"
      PERFORMER_ID: yata-read-0
      YATA_ORG_ID: test-org
    volumes:
      - yata-read-0-data:/data/yata
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Read Replica 1 ──
  yata-read-1:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8091:8081"
    environment:
      RUST_LOG: info,yata_engine=debug
      YATA_S3_ENDPOINT: http://minio:9000
      YATA_S3_BUCKET: yata
      YATA_S3_ACCESS_KEY_ID: minioadmin
      YATA_S3_SECRET_ACCESS_KEY: minioadmin
      YATA_S3_REGION: us-east-1
      YATA_S3_PREFIX: "yata/"
      YATA_DATA_DIR: /data/yata
      YATA_REST_PORT: "8081"
      YATA_API_SECRET: test-token
      YATA_VINEYARD_BUDGET_MB: "256"
      YATA_HOT_PARTITION_ID: "0"
      YATA_PERSISTENCE_MODE: wal_projection
      YATA_READONLY: "true"
      PERFORMER_ID: yata-read-1
      YATA_ORG_ID: test-org
    volumes:
      - yata-read-1-data:/data/yata
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  yata-write-data:
  yata-read-0-data:
  yata-read-1-data:
