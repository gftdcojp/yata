[package]
name = "yata-lance"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Lance format persistence for yata graph (COO sorted tables)"

[dependencies]
# Lance (no cloud providers — custom ObjectStore adapter over yata-s3)
lance = { version = "3.0", default-features = false }
lance-io = { version = "3.0", default-features = false }
lance-table = { version = "3.0", default-features = false }

# Arrow (workspace-aligned)
arrow = { workspace = true }
arrow-array = { workspace = true }
arrow-schema = { workspace = true }

# Internal
yata-grin = { path = "../yata-grin" }
yata-s3 = { path = "../yata-s3" }

# Async
tokio.workspace = true
futures.workspace = true
async-trait.workspace = true

# Serialization / IO
serde.workspace = true
serde_json.workspace = true
bytes.workspace = true
tracing.workspace = true
thiserror.workspace = true

# object_store (trait only, no cloud features)
object_store = { version = "0.12", default-features = false }
url = "2"
