[package]
name = "yata-server"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Embedded broker: graph (Cypher) + objects (CAS), MDAG-native replication"

[[bin]]
name = "ai-gftd-yata-server"
path = "src/main.rs"

[lib]
name = "yata_server"
path = "src/lib.rs"

[dependencies]
yata-core.workspace = true
yata-arrow.workspace = true
yata-object.workspace = true
yata-graph.workspace = true
yata-s3.workspace = true
yata-store.workspace = true
yata-engine.workspace = true
yata-grin.workspace = true
arrow.workspace = true
async-trait.workspace = true
base64.workspace = true
bytes.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tokio = { workspace = true }
uuid.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
chrono.workspace = true
metrics.workspace = true
metrics-exporter-prometheus.workspace = true
axum.workspace = true
ring.workspace = true

[dev-dependencies]
tempfile = "3"
yata-vineyard = { path = "../yata-vineyard" }
reqwest = { version = "0.12", features = ["blocking", "json"] }
serde_json = "1"
arrow = { version = "53", features = ["ipc"] }
arrow-array = "53"
arrow-schema = "53"
tower = "0.5"
http-body-util = "0.1"

[package.metadata.cargo-machete]
ignored = ["arrow-array", "arrow-schema"]
