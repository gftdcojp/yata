<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1400" viewBox="0 0 1200 1400" font-family="'SF Mono','Menlo','Monaco',monospace" font-size="11">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lanceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="csrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="coldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.06"/>
    </linearGradient>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6b7280"/></marker>
    <marker id="aP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22c55e"/></marker>
  </defs>

  <rect width="1200" height="1400" fill="url(#bgGrad)"/>

  <text x="600" y="35" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="bold">yata — LanceDB Graph Engine</text>
  <text x="600" y="55" text-anchor="middle" fill="#94a3b8" font-size="11">lancedb 0.27 (lance 4.0) | Cypher + CSR 3.8M QPS | No WAL | No S3 | No cache</text>

  <!-- ==================== DATA FLOW ==================== -->
  <g transform="translate(60, 85)">

    <!-- PDS -->
    <rect x="350" y="0" width="380" height="35" rx="6" fill="url(#coldGrad)" stroke="#3b82f6" stroke-width="0.5"/>
    <text x="540" y="22" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">PDS Worker (TS)</text>

    <!-- Write arrow -->
    <line x1="440" y1="35" x2="270" y2="70" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#a)"/>
    <text x="310" y="55" fill="#f59e0b" font-size="9">mergeRecord()</text>

    <!-- Read arrow -->
    <line x1="640" y1="35" x2="810" y2="70" stroke="#22c55e" stroke-width="1.2" marker-end="url(#aG)"/>
    <text x="710" y="55" fill="#22c55e" font-size="9">cypher()</text>

    <!-- ==================== WRITE SIDE ==================== -->
    <rect x="60" y="70" width="420" height="140" rx="8" fill="#111827" stroke="#4b5563" stroke-width="0.5"/>
    <text x="75" y="90" fill="#f59e0b" font-size="13" font-weight="bold">Write</text>

    <!-- L0 CSR -->
    <rect x="80" y="100" width="180" height="50" rx="5" fill="url(#csrGrad)" stroke="#22c55e" stroke-width="0.5"/>
    <text x="90" y="118" fill="#86efac" font-size="11" font-weight="bold">L0 CSR (in-memory)</text>
    <text x="90" y="133" fill="#94a3b8" font-size="9">merge_vertex_by_pk()</text>
    <text x="90" y="144" fill="#6b7280" font-size="8">instant, 0.3us, 3.8M QPS</text>

    <!-- Compact -->
    <rect x="280" y="100" width="180" height="50" rx="5" fill="url(#lanceGrad)" stroke="#8b5cf6" stroke-width="0.5"/>
    <text x="290" y="118" fill="#c4b5fd" font-size="11" font-weight="bold">table.compact()</text>
    <text x="290" y="133" fill="#94a3b8" font-size="9">@ 10K writes threshold</text>
    <text x="290" y="144" fill="#6b7280" font-size="8">LanceDB fragment merge</text>

    <line x1="260" y1="125" x2="280" y2="125" stroke="#8b5cf6" stroke-width="1" marker-end="url(#aP)"/>

    <!-- R2 -->
    <rect x="280" y="165" width="180" height="30" rx="5" fill="url(#coldGrad)" stroke="#06b6d4" stroke-width="0.5"/>
    <text x="370" y="184" text-anchor="middle" fill="#67e8f9" font-size="10">R2 (Lance fragments)</text>
    <line x1="370" y1="150" x2="370" y2="165" stroke="#06b6d4" stroke-width="1" marker-end="url(#a)"/>

    <!-- ==================== READ SIDE ==================== -->
    <rect x="600" y="70" width="420" height="140" rx="8" fill="#111827" stroke="#4b5563" stroke-width="0.5"/>
    <text x="615" y="90" fill="#22c55e" font-size="13" font-weight="bold">Read</text>

    <!-- LanceDB scan -->
    <rect x="620" y="100" width="180" height="50" rx="5" fill="url(#lanceGrad)" stroke="#8b5cf6" stroke-width="0.5"/>
    <text x="630" y="118" fill="#c4b5fd" font-size="11" font-weight="bold">table.scan_filter()</text>
    <text x="630" y="133" fill="#94a3b8" font-size="9">per-label demand page-in</text>
    <text x="630" y="144" fill="#6b7280" font-size="8">on cache miss only</text>

    <!-- CSR query -->
    <rect x="820" y="100" width="180" height="50" rx="5" fill="url(#csrGrad)" stroke="#22c55e" stroke-width="0.5"/>
    <text x="830" y="118" fill="#86efac" font-size="11" font-weight="bold">Cypher → GIE → CSR</text>
    <text x="830" y="133" fill="#94a3b8" font-size="9">3.8M QPS warm</text>
    <text x="830" y="144" fill="#6b7280" font-size="8">graph traversal O(1)</text>

    <line x1="800" y1="125" x2="820" y2="125" stroke="#22c55e" stroke-width="1" marker-end="url(#aG)"/>

    <!-- R2 read -->
    <rect x="620" y="165" width="180" height="30" rx="5" fill="url(#coldGrad)" stroke="#06b6d4" stroke-width="0.5"/>
    <text x="710" y="184" text-anchor="middle" fill="#67e8f9" font-size="10">R2 (Lance fragments)</text>
    <line x1="710" y1="165" x2="710" y2="150" stroke="#06b6d4" stroke-width="1" marker-end="url(#a)"/>
  </g>

  <!-- ==================== COLD START ==================== -->
  <g transform="translate(60, 310)">
    <rect x="280" y="0" width="520" height="35" rx="6" fill="url(#lanceGrad)" stroke="#8b5cf6" stroke-width="0.5"/>
    <text x="540" y="22" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">Cold start: db.open_table("vertices") → hot = true → labels on-demand</text>
  </g>

  <!-- ==================== PERF ==================== -->
  <g transform="translate(60, 370)">
    <text x="0" y="0" fill="#f59e0b" font-size="14" font-weight="bold">Production (lancedb 0.27, 2026-03-31)</text>

    <rect x="0" y="15" width="520" height="150" rx="6" fill="#1e293b" fill-opacity="0.5" stroke="#4b5563" stroke-width="0.5"/>
    <text x="15" y="38" fill="#22c55e" font-size="11">S-grade (8 endpoints):  p50 = 9.0-9.5ms, ~104 RPS</text>
    <text x="15" y="58" fill="#22c55e" font-size="11">GetTimeline:    15s → 653ms (23x) — WAL replay 除去効果</text>
    <text x="15" y="78" fill="#22c55e" font-size="11">GetDiscoverFeed: 10.5s → 704ms (15x)</text>
    <text x="15" y="98" fill="#e2e8f0" font-size="11">GetAuthorFeed:  1560ms → 512ms (3x)</text>
    <text x="15" y="118" fill="#e2e8f0" font-size="11">ListRecords:    879ms → 478ms (1.8x)</text>
    <text x="15" y="143" fill="#94a3b8" font-size="10">Warm CSR: 3.3-3.8M QPS (unchanged)</text>
    <text x="15" y="158" fill="#94a3b8" font-size="10">Cold start: ~50ms (LanceDB open_table)</text>

    <rect x="540" y="15" width="520" height="150" rx="6" fill="#1e293b" fill-opacity="0.5" stroke="#4b5563" stroke-width="0.5"/>
    <text x="555" y="38" fill="#ef4444" font-size="11" font-weight="bold">Deleted (~5,400 lines)</text>
    <text x="555" y="58" fill="#6b7280" font-size="10">yata-s3 crate (1,620) — LanceDB S3 内蔵</text>
    <text x="555" y="73" fill="#6b7280" font-size="10">compaction.rs (831) — table.compact()</text>
    <text x="555" y="88" fill="#6b7280" font-size="10">cache.rs (188) — CF edge cache</text>
    <text x="555" y="103" fill="#6b7280" font-size="10">WAL ring + flush + apply + tail (480)</text>
    <text x="555" y="118" fill="#6b7280" font-size="10">store/manifest/catalog/writer/vector/compat (1,850)</text>
    <text x="555" y="133" fill="#6b7280" font-size="10">7 deps (lance-*, object_store, blake3)</text>
    <text x="555" y="158" fill="#22c55e" font-size="10">Replaced by: lancedb = "0.27" (1 dep)</text>
  </g>

  <!-- ==================== CRATE MAP ==================== -->
  <g transform="translate(60, 560)">
    <text x="0" y="0" fill="#06b6d4" font-size="14" font-weight="bold">Crate Map</text>

    <rect x="0" y="18" width="170" height="35" rx="5" fill="url(#lanceGrad)" stroke="#8b5cf6" stroke-width="0.5"/>
    <text x="10" y="40" fill="#c4b5fd" font-size="12" font-weight="bold">yata-lance</text>
    <text x="10" y="48" fill="#94a3b8" font-size="8">1,074 lines | lancedb 0.27</text>

    <rect x="190" y="18" width="170" height="35" rx="5" fill="url(#csrGrad)" stroke="#22c55e" stroke-width="0.5"/>
    <text x="200" y="40" fill="#86efac" font-size="12" font-weight="bold">yata-engine</text>
    <text x="200" y="48" fill="#94a3b8" font-size="8">4,055 lines | no WAL/cache</text>

    <rect x="380" y="18" width="170" height="35" rx="5" fill="url(#coldGrad)" stroke="#3b82f6" stroke-width="0.5"/>
    <text x="390" y="40" fill="#93c5fd" font-size="12" font-weight="bold">yata-cypher</text>
    <text x="390" y="48" fill="#94a3b8" font-size="8">10,475 lines | CSR + parser</text>

    <rect x="570" y="18" width="170" height="35" rx="5" fill="url(#coldGrad)" stroke="#3b82f6" stroke-width="0.5"/>
    <text x="580" y="40" fill="#93c5fd" font-size="12" font-weight="bold">yata-gie</text>
    <text x="580" y="48" fill="#94a3b8" font-size="8">6,316 lines | GIE + Security</text>

    <rect x="760" y="18" width="170" height="35" rx="5" fill="#1e293b" stroke="#4b5563" stroke-width="0.5"/>
    <text x="770" y="40" fill="#94a3b8" font-size="12">yata-server</text>
    <text x="770" y="48" fill="#6b7280" font-size="8">XRPC API + JWT</text>
  </g>

  <!-- Footer -->
  <text x="600" y="660" text-anchor="middle" fill="#4b5563" font-size="10">yata | lancedb 0.27 | 2026-03-31 | Write: L0 CSR + compact | Read: LanceDB scan + CSR query</text>
</svg>
