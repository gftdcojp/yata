[package]
name = "lance-encoding"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
description = "Encoders and decoders for the Lance file format"
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[dependencies]
lance-arrow.workspace = true
lance-core.workspace = true
arrow = { version = "54.1", default-features = false }
arrow-arith.workspace = true
arrow-array.workspace = true
arrow-data.workspace = true
arrow-buffer.workspace = true
arrow-cast.workspace = true
arrow-schema.workspace = true
arrow-select.workspace = true
bytes.workspace = true
futures.workspace = true
fsst.workspace = true
hex = "0.4.3"
itertools.workspace = true
lazy_static.workspace = true
log.workspace = true
num-traits.workspace = true
prost.workspace = true
hyperloglogplus.workspace = true
prost-types.workspace = true
rand.workspace = true
snafu.workspace = true
tracing.workspace = true
bytemuck = "1.14"
arrayref = "0.3.7"
paste = "1.0.15"
seq-macro = "0.3.5"
byteorder.workspace = true

# WASM-gated: these deps need native/C toolchain
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio.workspace = true
zstd.workspace = true
lz4 = "1.28.1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
tokio = { version = "1.23", features = ["sync", "macros", "rt", "time"] }

[dev-dependencies]
lance-testing.workspace = true
lance-datagen.workspace = true
rand.workspace = true
rstest.workspace = true
tempfile.workspace = true
test-log.workspace = true
criterion = { workspace = true }
rand_xoshiro = "0.6.0"

[build-dependencies]
prost-build.workspace = true
protobuf-src = { version = "2.1", optional = true }

[target.'cfg(target_os = "linux")'.dev-dependencies]
pprof = { workspace = true }

[features]
protoc = ["dep:protobuf-src"]

[package.metadata.docs.rs]
features = ["protoc"]

[[bench]]
name = "decoder"
harness = false

[[bench]]
name = "buffer"
harness = false

[lints]
workspace = true
