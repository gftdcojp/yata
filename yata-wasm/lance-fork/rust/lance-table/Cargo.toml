[package]
name = "lance-table"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
description = "Utilities for the Lance table format"
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[dependencies]
lance-arrow.workspace = true
lance-core.workspace = true
lance-file = { path = "../lance-file", default-features = false }
lance-io = { path = "../lance-io", default-features = false }
arrow = { version = "54.1", default-features = false }
arrow-array.workspace = true
arrow-buffer.workspace = true
arrow-ipc = { version = "54.1", default-features = false }
arrow-schema.workspace = true
async-trait.workspace = true
byteorder.workspace = true
bytes.workspace = true
chrono.workspace = true
deepsize.workspace = true
futures.workspace = true
log.workspace = true
prost.workspace = true
prost-types.workspace = true
rand.workspace = true
rangemap.workspace = true
roaring.workspace = true
serde.workspace = true
serde_json.workspace = true
snafu.workspace = true
tracing.workspace = true
url.workspace = true
uuid = { version = "1", features = ["v4", "js"] }

# WASM-gated deps
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio.workspace = true
object_store = { workspace = true }
aws-credential-types = { workspace = true, optional = true }
aws-sdk-dynamodb = { workspace = true, optional = true }
lazy_static = { workspace = true, optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
tokio = { version = "1.23", features = ["sync", "macros", "rt", "time"] }
object_store = { version = "0.11.0", default-features = false }

[dev-dependencies]
lance-datagen.workspace = true
arrow-schema.workspace = true
criterion.workspace = true
pretty_assertions.workspace = true
proptest.workspace = true

[target.'cfg(target_os = "linux")'.dev-dependencies]
pprof = { workspace = true }

[build-dependencies]
prost-build.workspace = true
protobuf-src = { version = "2.1", optional = true }

[features]
dynamodb = ["aws-sdk-dynamodb", "lazy_static", "aws-credential-types", "lance-io/aws"]
protoc = ["dep:protobuf-src"]

[package.metadata.docs.rs]
features = ["protoc"]

[[bench]]
name = "row_id_index"
harness = false

[lints]
workspace = true
